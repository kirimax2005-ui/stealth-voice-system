<!DOCTYPE html>
<html>
<head>
  <title>Indie Call</title>
</head>

<body style="background:#111;color:white;text-align:center;font-family:sans-serif">

<h2>🔐 Indie Call</h2>

<div id="home">
    <button onclick="generateLink()">Generate Call Link</button>
    <p id="link"></p>

    <input id="tokenInput" placeholder="Enter Token">
    <br><br>
    <button onclick="verify()">Join Call</button>
</div>

<div id="call" style="display:none;">
    <h3 id="status">Connecting...</h3>
    <audio id="audio" autoplay playsinline controls></audio>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const SERVER = "https://stealth-voice-system.onrender.com";

const socket = io(SERVER);

let pc;
let stream;
let token = null;

// 🔗 Generate link
async function generateLink() {
    const res = await fetch(`${SERVER}/generate-link`, { method: "POST" });
    const data = await res.json();

    document.getElementById("link").innerText = data.link;
    document.getElementById("tokenInput").value = data.token;
}

// ✅ Manual join
async function verify() {
    token = document.getElementById("tokenInput").value;

    if (!token) return alert("Enter token");

    const res = await fetch(`${SERVER}/verify-token`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (data.success) {
        startCall();
    } else {
        alert("Invalid token ❌");
    }
}

// 🚀 Start call
async function startCall() {

    document.getElementById("home").style.display = "none";
    document.getElementById("call").style.display = "block";

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    console.log("LOCAL TRACKS:", stream.getTracks());

    pc = new RTCPeerConnection({
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            {
                urls: [
                    "turn:relay1.expressturn.com:3478",
                    "turn:relay1.expressturn.com:80"
                ],
                username: "ef8R0F4N4R9E6T",
                credential: "Yd1R9Z9X"
            }
        ]
    });

    // ✅ Add mic
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    // 🔥 Receive remote audio
    pc.ontrack = (event) => {
        console.log("REMOTE STREAM RECEIVED ✅");

        const audio = document.getElementById("audio");

        if (!audio.srcObject) {
            audio.srcObject = event.streams[0];
        }

        audio.muted = false;
        audio.volume = 1;

        audio.play().then(() => {
            console.log("🔊 PLAYING AUDIO");
        }).catch(err => {
            console.log("Autoplay blocked:", err);
        });

        document.getElementById("status").innerText = "Connected 🟢";
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("ice", { token, candidate: e.candidate });
        }
    };

    pc.oniceconnectionstatechange = () => {
        console.log("ICE STATE:", pc.iceConnectionState);
    };

    socket.emit("join", token);

    socket.on("ready", async (isCaller) => {
        if (isCaller) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit("offer", { token, offer });
        }
    });

    socket.on("offer", async (offer) => {
        await pc.setRemoteDescription(offer);

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("answer", { token, answer });
    });

    socket.on("answer", async (answer) => {
        await pc.setRemoteDescription(answer);
    });

    socket.on("ice", async (candidate) => {
        try {
            await pc.addIceCandidate(candidate);
        } catch (e) {
            console.error("ICE error:", e);
        }
    });
}

// 🔥 AUTO JOIN FROM LINK
window.addEventListener("DOMContentLoaded", async () => {
    const parts = window.location.pathname.split("/");

    if (parts[1] === "join" && parts[2]) {
        token = parts[2];

        document.getElementById("tokenInput").value = token;

        const res = await fetch(`${SERVER}/verify-token`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (data.success) {
            startCall();
        } else {
            alert("Invalid or expired link ❌");
        }
    }
});

// 🔥 Mobile audio fix
document.body.addEventListener("click", () => {
    const audio = document.getElementById("audio");
    if (audio.srcObject) {
        audio.play().catch(() => {});
    }
});
</script>

</body>
</html>
